# CI 中强制执行的格式检查：
# 1. 注释必须写在字段上方。
# 2. 字段之间必须保留一个空行。
# 3. 不允许行内注释，也就是不能把注释放在字段同一行后面。
# 4. 嵌套字段必须保持正确缩进层级。

# 指定各组件的默认配置。
defaults:

  # actor_rollout_ref.actor: trainer/config/actor/dp_actor.yaml
  - actor@actor_rollout_ref.actor: dp_actor

  # data: trainer/config/data/legacy_data.yaml
  - data@data: legacy_data

  # 参考模型配置。
  - ref@actor_rollout_ref.ref: dp_ref

  # rollout 推理模型配置。
  - rollout@actor_rollout_ref.rollout: rollout

  # HuggingFace 模型配置。
  - model@actor_rollout_ref.model: hf_model

  # critic 模型配置。
  - critic@critic: dp_critic

  # reward model 配置。
  - reward_model@reward_model: dp_reward_model

  # rollout correction 配置。
  - algorithm@algorithm.rollout_correction: rollout_correction

  # ranker/recall/contrastive 训练基础配置；内容合并到全局配置树。
  - experimental/ranker_base@_global_: ranker_contrastive

  # 异步 ranker 信号标注基础配置；内容合并到全局配置树。
  - experimental/async_ranker_training_base@_global_: async_ranker_training

  # 先加载引用的默认配置，再应用当前 YAML 中定义的字段。
  - _self_

# actor、rollout 和参考模型相关配置。
actor_rollout_ref:

  # 是否使用 hybrid engine；当前只支持 hybrid engine。
  hybrid_engine: true

  # 针对进程组执行操作时的超时时间。
  nccl_timeout: 600

  # rollout 模型配置。
  rollout:

    # 对大模型启用 layered summon 可节省显存、降低 OOM 风险，但会变慢。
    layered_summon: False

# 自定义 reward 函数定义。
custom_reward_function:

  # 包含自定义 reward 函数的文件路径。
  path: ${oc.env:COAGENTIC_PROJECT_ROOT,/data01/ms_wksp/agent_up_to_date/CoSearch_derevitives/CoAgenticRetriever}/rewards/search_qa_f1_with_format_penalty.py

  # 指定文件中的 reward 函数名称。
  name: search_qa_f1_penalty_compute_score

  # 传给 reward 函数的额外关键字参数。
  reward_kwargs:

    # 输出格式错误时的 reward 惩罚项。
    format_penalty: -0.2

# 算法相关配置。
algorithm:

  # 使用 verl.utils.omega_conf_to_dataclass 实例化 dataclass 配置时需要指定。
  _target_: verl.trainer.config.AlgoConfig

  # 未来 reward 的折扣因子。
  gamma: 1.0

  # GAE 估计器中 bias 和 variance 的权衡系数。
  lam: 1.0

  # advantage 估计器类型，例如 "gae"、"grpo"、"reinforce_plus_plus" 等。
  adv_estimator: gae

  # 是否按标准差归一化 advantage。
  norm_adv_by_std_in_grpo: True

  # 是否启用 reward 内部的 KL 惩罚。
  use_kl_in_reward: False

  # KL divergence 的估计方式。
  kl_penalty: kl

  # KL 控制配置。
  kl_ctrl:

    # 使用 verl.utils.omega_conf_to_dataclass 实例化 dataclass 配置时需要指定。
    _target_: verl.trainer.config.KLControlConfig

    # KL 控制类型。
    type: fixed

    # KL 惩罚的初始系数。
    kl_coef: 0.001

    # 自适应控制器的 horizon 值。
    horizon: 10000

    # 目标 KL divergence。
    target_kl: 0.1

  # 是否启用 preference feedback PPO。
  use_pf_ppo: False

  # preference feedback PPO 配置。
  pf_ppo:

    # 样本重加权方法。
    reweight_method: pow

    # 权重缩放使用的幂指数。
    weight_pow: 2.0

# trainer 相关配置。
trainer:

  # 是否在分布式 worker 之间均衡 batch size。
  balance_batch: True

  # 训练 epoch 数。
  total_epochs: 1

  # 总训练步数。
  total_training_steps: null

  # 实验追踪使用的项目名。
  project_name: verl_examples

  # 用于标识 run 的实验名。
  experiment_name: gsm8k

  # 使用的日志后端。
  logger: ["console", "wandb"]

  # 验证时记录的生成样本数量。
  log_val_generations: 0

  # 训练 reward manager 打印检查的样本批次数量。
  num_examine: 0

  # 验证 reward manager 打印检查的样本批次数量。
  val_num_examine: 1

  # rollout 数据日志目录。
  rollout_data_dir: null

  # 每隔 N 个 global step dump 一次 rollout 数据；<=0 表示关闭 dump。
  dump_rollout_every_step_num: 10

  # 每次 dump 的轨迹数量；-1 表示 dump 完整 rollout batch。
  dump_rollout_num_everytime: 1

  # 最多保留的 rollout dump 文件数量；-1 表示不限制。
  max_rollout_dump_num: -1

  # rollout trace 详细程度；full 写入包含完整 observations 和 top-N 文档的 tool_call_details/messages，partial 保留轻量旧版 dump。
  rollout_trace_mode: full

  # 是否禁用 rollout 内旧 reranker 路径。
  disable_reranker_rollout: true

  # 验证数据日志目录。
  validation_data_dir: null

  # 训练使用的节点数量。
  nnodes: 1

  # 每个节点使用的 GPU 数量。
  n_gpus_per_node: 8

  # checkpoint 保存频率。
  save_freq: -1

  # ESI checkpoint 保存的冗余时间。
  esi_redundant_time: 0

  # 断点恢复模式。
  resume_mode: auto

  # 用于恢复训练的 checkpoint 路径。
  resume_from_path: null

  # 是否在训练开始前运行验证。
  val_before_train: True

  # 是否只运行验证。
  val_only: False

  # 验证频率。
  test_freq: -1

  # 更新 policy 前 critic 预热的迭代次数。
  critic_warmup: 0

  # 保存 checkpoint 的默认分布式文件系统路径。
  default_hdfs_dir: null

  # 加载后是否删除本地 checkpoint。
  del_local_ckpt_after_load: False

  # 保存 checkpoint 的默认本地目录。
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}

  # 最多保留的 actor checkpoint 数量。
  max_actor_ckpt_to_keep: null

  # 最多保留的 critic checkpoint 数量。
  max_critic_ckpt_to_keep: null

  # Ray worker 注册超时时间。
  ray_wait_register_center_timeout: 300

  # 训练运行设备。
  device: cuda

  # 是否使用旧版 worker 实现。
  use_legacy_worker_impl: auto

# profiler 相关配置。
global_profiler:

  # 使用 verl.utils.omega_conf_to_dataclass 实例化 dataclass 配置时需要指定。
  _target_: verl.utils.profiler.ProfilerConfig

  # profiling 工具。
  tool: null

  # 需要 profile 的 step。
  steps: null

  # 是否将连续 step 合并到同一个数据库中。
  profile_continuous_steps: False

  # profiling 内容保存路径。
  save_path: "outputs/profile"

  # 各具体工具的配置。
  global_tool_config:

    # nsys 配置。
    nsys:

      # 使用 verl.utils.omega_conf_to_dataclass 实例化 dataclass 配置时需要指定。
      _target_: verl.utils.profiler.config.NsightToolConfig

      # True 表示每个 task 使用独立数据库；False 表示同一个训练 step 内所有 task 共用一个数据库。
      discrete: False

      # controller 侧 Nvidia Nsight Systems 选项。
      controller_nsight_options:

        # 选择需要 trace 的 API。
        trace: "cuda,nvtx,cublas,ucx"

        # 跟踪 CUDA kernel 的 GPU 显存使用。
        cuda-memory-usage: "true"

        # 将 CUDA graph 作为整体进行 trace。
        cuda-graph-trace: "graph"

      # worker 侧 Nvidia Nsight Systems 选项。
      worker_nsight_options:

        # 选择需要 trace 的 API。
        trace: "cuda,nvtx,cublas,ucx"

        # 跟踪 CUDA kernel 的 GPU 显存使用。
        cuda-memory-usage: "true"

        # 将 CUDA graph 作为整体进行 trace。
        cuda-graph-trace: "graph"

        # 仅在 torch.cuda.profiler.start 和 stop 包围的范围内 profiling。
        capture-range: "cudaProfilerApi"

        # capture range 结束时的行为。
        capture-range-end: null

        # 向目标应用的进程组发送信号。
        kill: none

    # 启用内存可视化，用于调试内存使用。
    torch_memory:

      # 最多记录的内存分配条目数。
      trace_alloc_max_entries: 100_000

      # 每次分配记录的调用栈深度。
      stack_depth: 32

      # 内存事件上下文。
      context: "all"

      # 调用栈来源。
      stacks: "all"

      # 额外关键字参数。
      kw_args: {}

# TransferQueue 相关配置。
transfer_queue:

  # 是否启用 transfer queue。
  enable: False

# Ray 相关配置。
ray_kwargs:

  # Ray 初始化相关配置。
  ray_init:

    # Ray 可用 CPU 数量。
    num_cpus: 16

    # 是否启动 Ray dashboard；训练入口默认关闭，避免占用额外端口和资源。
    include_dashboard: false

    # Ray object store 内存大小，单位 byte。
    object_store_memory: 2147483648

  # Ray timeline JSON 保存路径。
  timeline_json_file: null
