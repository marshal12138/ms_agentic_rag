# CoAgenticRetriever no-ranker/recall-only search tool 静态模板。
#
# eval runtime 在 run_mode=no-ranker 且未显式覆盖 TOOL_CONFIG 时会选择这个文件。
# compiler 会把它复制成每次运行自己的 runtime tool config。recall_final_top_n 等
# 运行态字段仍由 compiler 从最终 Hydra/ranker 配置生成，不在静态模板中维护。

tools:
  # 搜索工具类；agent 发出 search tool call 时会调用这个实现。
  - class_name: verl.tools.coagentic_retriever_tool.CoAgenticRetrieverTool
    config:
      # 工具类型标记；当前实现按本地/原生 HTTP recall retriever 使用。
      type: native

      # recall retriever HTTP 服务地址；compiler/launcher 可在 runtime tool config 中改写端口。
      retrieval_service_url: "http://127.0.0.1:8030/retrieve"
      # 单次 recall 请求超时时间，单位秒。
      timeout: 30

      # recall 请求失败后的最大重试次数。
      max_retries: 3
      # 第一次重试前等待时间，单位秒。
      retry_delay: 1.0
      # 每次失败后重试等待时间的放大倍率。
      retry_backoff: 2.0

      # 最终格式化进 tool response、交给 agent 继续 think/generate 的文档数上限。
      searchTool_final_top_m: 5
      # 工具奖励 hit 指标的 cutoff 列表，例如 hit@1/hit@3/hit@5。
      hit_cutoffs: [1, 3, 5]
      # 工具奖励指标类型；hit 表示按答案是否命中文档计算，ndcg 表示按 NDCG 计算。
      tool_score_metric: "hit"
      # 这些答案被视为简单答案；计算 answer_in_docs 时会特殊处理，避免无意义匹配。
      trivial_answers: ["yes", "no", "true", "false"]
      # 每个 worker 内允许并发执行的 search tool 请求数。
      max_concurrent_per_worker: 4

      # no-ranker 模板显式关闭 dense ranker；tool 会保持 recall 顺序并把 recall top-M 暴露给 agent。
      ranker_enabled: false
      # ranker 段保留最小结构，方便 runtime tool config schema 和 full 模式保持一致。
      ranker:
        # no-ranker 下不会调用 Ray actor；保留 backend 只是为了结构一致。
        backend: ray_actor
        # no-ranker 下 ranker 不要求可用。
        required: false
