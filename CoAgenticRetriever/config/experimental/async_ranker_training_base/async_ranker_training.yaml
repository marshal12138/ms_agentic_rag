# CoAgenticRetriever 异步 ranker training 信号配置默认值。
# 这份配置只描述“训练过程中如何异步生成 ranker 对比学习信号”和“如何从信号构造样本”。
# LLM judge vLLM 服务如何启动由 CoAgenticRetriever/async_ranker_training/configs/*.yaml 控制。

ranker_training:

  # ranker 对比学习信号来源。
  # pseudo_rank: 使用原有伪标签/启发式构造信号。
  # async_ranker_training: 使用本文件 async_ranker_training 段定义的异步打分信号。
  signal_source: pseudo_rank

  # rollout/search tool 使用的共享 dense ranker 推理副本。
  # 训练进程会创建这个 Ray named actor；AgentLoopWorker 通过 actor_name 调用它，
  # 避免每个 worker 各自加载一份 E5。训练 ranker 每 sync_interval 个 ranker update step
  # 同步一次参数到该推理副本。
  shared_inference_ranker:
    enable: true
    sync_interval: 5

  async_ranker_training:

    # 是否启用异步 ranker training 信号系统。
    # true 时，训练主循环会把 rollout 中的候选 tool call 提交给 async ranker training labeler；
    # false 时，不启动 async ranker training labeler，也不从异步 buffer 构造 ranker 样本。
    enable: false

    # 每个 global step 最多提交给 async ranker training labeler 的 sub_query 数。
    # 用于限制单步产生过多 judge request，避免 ranker contrastive step 大幅落后于 GRPO step。
    max_sub_query: 6

    # 最大允许的 global step 滞后。
    # 如果 async ranker training labeler 正在处理的请求相对当前 global step 落后超过该值，则跳过过旧请求。
    max_glb_step_lag: 3

    # 待处理请求队列容量。
    # 队列满时会按照 drop_policy 丢弃请求，防止训练进程无限堆积内存。
    request_queue_size: 128

    # 已完成 CandidateSignalData buffer 容量。
    # sample_builder 从这个 buffer 中消费最新的候选信号数据来构造对比学习样本。
    completed_buffer_size: 128

    # 进入 sample_builder 前需要攒够的 completed judge signal 数。
    # 1 表示一条 completed signal 即可触发一次 signal_builder/sample_builder。
    # 大于 1 时，ranker async trainer 会等待 buffer 中至少有这么多 completed signals，
    # 然后把这批 signals 一起交给 signal_builder/sample_builder；最终样本组数仍由
    # sample_builder.num_groups_per_step 控制。
    sample_builder_request_batch: 1

    # 是否用后台 Python 线程执行 ranker contrastive update。
    # 默认 false：LLM judge 仍异步，但 ranker update 在主训练循环中 opportunistic 执行，
    # 避免后台线程持有 CUDA/ranker lock 后静默卡死。
    background_ranker_thread: false

    # background_ranker_thread=false 时，每个主训练 global step 最多主动尝试多少次
    # ranker async update。该参数只控制前台 opportunistic update 模式；
    # background_ranker_thread=true 时由后台线程持续消费 completed signals，本参数不参与调度。
    ranker_updates_per_global_step: 1

    # buffer/队列满时的丢弃策略。
    # drop_oldest: 丢弃最旧数据，优先保留更接近当前策略分布的新信号。
    drop_policy: drop_oldest

    # async ranker training labeler worker 数。
    # worker 越多，并发请求 judge 服务越多；需要和 judge vLLM 服务吞吐、显存、HTTP 稳定性一起调。
    num_workers: 4

    # async ranker training labeler 单个请求在框架层的默认超时时间，单位秒。
    # stage 内也可以覆盖更具体的 request_timeout_seconds。
    request_timeout_seconds: 60

    # async ranker training labeler 框架层默认重试次数。
    # stage 内也可以覆盖更具体的 max_retries。
    max_retries: 2

    # 从 rollout 候选 tool call / CandidateSignalData 请求池中选择 sub_query 的策略。
    # random: 当候选请求数超过 max_sub_query 时，从候选池中无放回随机抽取 max_sub_query 个。
    # first/high_value_first: 兼容旧行为，按候选生成顺序取前 max_sub_query 个，不建议作为默认训练策略。
    # 该随机只作用于“选哪些 sub_query 请求”，不会打乱每个请求内部 ranker 排序后的 top50 doc 顺序。
    sub_query_selection_policy: random

    # sub_query 随机抽样种子。
    # 实际抽样使用 selection_seed + global_step 做确定性随机，保证同一 global step 可复现。
    selection_seed: 42

    # 写入 AsyncLabelRequest 的标签策略名称；必须显式配置，避免 Python 代码侧兜底。
    label_policy: llm_judge_rank50

    # 写入 CandidateSignalData 的标签来源名称。
    label_source: llm_judge

    # 写入 CandidateSignalData 的打分版本号。
    score_version: rank50_linear_v1

    # 从 rollout 轨迹中选择要提交给 async judge 的 tool call 上下文。
    trajectory_selector:
      # 轨迹选择策略名称。
      type: select_all
      # 选择分数最高的 top_k 条有效 trajectory。
      min_final_reward: 0.0

    # 异步打分流水线阶段。
    # 当前默认只有 llm_as_judge；后续可以在其后追加 extra_scorer 等阶段。
    stages:
      # LLM-as-judge 阶段：对一个 origin_query + sub_query + rank_top50_chunks 请求打分。
      - type: llm_as_judge
        # OpenAI-compatible chat completions endpoint。
        endpoint: http://127.0.0.1:8067/v1/chat/completions
        # judge 服务暴露的 served model name。
        model: DeepSeek-V4-Flash
        # judge 输出解析协议。
        # ranked_ids_top50 表示模型必须返回 50 个 doc_id 的完整排序。
        score_schema: ranked_ids_top50
        # 每个 judge request 评估的文档数。
        # 当前策略要求每次评估 ranker 排序后的 top50 chunks，不能改成 recall top50。
        max_docs_per_request: 50
        # judge 采样温度。排序 judge 默认用 0.0，减少输出波动。
        temperature: 0.0
        # judge 最大输出 token 数。
        # 需要足够容纳 50 个 id 的 JSON 排序结果；过大则会放大上下文长度压力。
        max_tokens: 8192
        # LLM judge HTTP 请求超时时间，单位秒。
        # 这里覆盖 async_ranker_training.request_timeout_seconds，因为 judge 请求通常更长。
        request_timeout_seconds: 600
        # LLM judge 阶段的重试次数。
        # judge 输出格式错误或 HTTP 失败达到重试上限后，计失败并丢弃，不写入 completed buffer。
        max_retries: 2
        # prompt 注入配置。prompt 必须从磁盘读取，不能硬编码在 Python 代码里。
        prompt:
          # 默认 judge prompt 文件路径。
          # 路径相对项目根目录；后续稳定 prompt 建议继续放在 CoAgenticRetriever/async_ranker_training/prompts/。
          path: CoAgenticRetriever/async_ranker_training/prompts/llm_judge_rank50_v1.md
          # prompt 版本号，写入 request/signal 日志，便于追踪不同 prompt 的数据质量。
          version: llm_judge_rank50_v1
          # prompt 模板格式。
          # markdown_system_user_template 表示从 markdown 文件读取 system/user 模板后填充 query 和 chunks。
          format: markdown_system_user_template
          # 每个 chunk 注入 prompt 时允许的最大字符数。
          # 控制总 prompt token，避免 50 个 chunk 加 max_tokens 后超过 vLLM max_model_len。
          max_chunk_chars: 512
          # 是否在 prompt 中包含 chunk title。
          include_title: true
          # 是否在 prompt 中包含 recall/rank 分数等检索排序信息。
          include_scores: true
          # 是否打乱 passage 顺序。
          # false 表示保持 ranker top50 顺序，便于 judge 同时利用当前 rank 顺序上下文。
          shuffle_passages: false
          # DeepSeek-V4-Flash 输出/思考模式，按官方 encoding 注入 chat_template_kwargs。
          # no_think: thinking_mode="chat"，在 Assistant 后直接放 </think>，只生成 JSON。
          # think_high: thinking_mode="thinking"，生成 <think>...</think> 后再输出 JSON。
          # think_max: thinking_mode="thinking" 且 reasoning_effort="max"，加入官方 max reasoning 前缀。
          output_mode: think_high

    # 从 completed buffer 中消费 CandidateSignalData 并构造 ranker 对比学习样本。
    # completed buffer 中一旦有 judge signal，ranker async trainer 会立即交给
    # signal_builder/sample_builder；样本组数和复采样由 sample_builder 策略负责。
    sample_builder:
      # 样本构造策略名。
      # random_negative_repeat 与现有 random_negative_repeat.py 的默认行为保持一致。
      type: random_negative_repeat
      # 每次 ranker contrastive step 期望构造的对比学习样本组数。
      # 构造过多则截断，构造不足则通过重复负采样补齐或等待更多信号。
      num_groups_per_step: 32
      # 每个正样本对应的负样本数。
      neg_per_pos: 15
      # 是否允许重复负采样。
      # true 时，一个 CandidateSignalData 即使正样本较少，也可以通过重复抽负样本补齐样本组数。
      allow_repeat_negative_sampling: true
      # 样本构造随机种子，控制负采样可复现性。
      seed: 42
      # 从 judge signal 到标准 labeled context 的转换策略。
      strategy_kwargs:
        # llm_judge_topk: judge 排名前 positive_top_k 的 docs 作为 positive，其余 judged docs 作为 negative。
        signal_builder_type: llm_judge_topk
        # judge 排名前 K 的 docs 作为 positive。
        positive_top_k: 5
        # 写入 contrastive sample 的 label_source。
        label_source: llm_judge_top5

    # async_ranker_training 独立观察日志配置。
    # 日志写入当前 train run 目录下的 async_ranker_training 子目录，不与主训练日志格式强耦合。
    logging:
      # 是否启用 async_ranker_training 专用日志。
      enable: true
      # 专用日志目录。
      # null 时默认使用 <train_log_run_dir>/async_ranker_training。
      log_dir: null
      # 是否把完整 request 文本写入日志。
      # false 可以避免日志过大；排查 prompt 问题时可临时打开。
      write_request_text: false
      # 日志中长文本字段的最大保留字符数。
      max_text_chars: 512
      # async ranker training labeler metrics.jsonl 写入间隔，单位秒。
      metrics_interval_seconds: 30
      # 每隔多少条完成信号写一个样本预览。
      # 用于低频观察 judge 输出和 sample_builder 输入质量。
      sample_preview_every_n: 50
