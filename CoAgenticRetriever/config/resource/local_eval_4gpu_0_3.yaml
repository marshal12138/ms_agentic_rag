# CoAgenticRetriever 本地 eval 的 4 设备布局。
#
# 约定：
# - agent vLLM 使用 0,1。
# - dense ranker 预留 2。
# - recall retriever 使用 3。
# - LLM judge 默认不自动启动；如果外部已有 judge 服务，可只做 endpoint preflight。

# 实验组名，用于默认日志/报告目录：log/eval_res/coAgenticRetriever 和 reports/eval/coAgenticRetriever。
GROUP_NAME: "coAgenticRetriever"

# agent vLLM tensor parallel 可见设备。
AGENT_GPU_IDS: "0,1"

# dense ranker 使用的设备。no-ranker 模式不会真正启动 dense ranker，但字段保留便于 full 模式复用。
RANK_GPU_ID: "2"

# recall retriever 服务使用的设备。
RECALL_GPU_ID: "3"

# LLM judge 服务设备。当前 4 设备 eval 默认不自动启动 judge，这里只是保留完整资源字段。
LLM_JUDGE_GPU_IDS: "6,7"

# 允许 launcher 自动启动 recall retriever 服务。
AUTO_START_RECALL_SERVICE: "1"

# launcher 退出时停止由本次 eval 自动启动的 recall retriever 服务。
AUTO_STOP_RECALL_SERVICE: "1"

# 等待 recall retriever 服务 ready 的最长时间，单位秒。
RECALL_SERVICE_WAIT_SECONDS: "240"

# 默认不自动启动 LLM judge 服务，避免 4 设备 no-ranker eval 占用额外设备。
AUTO_START_LLM_JUDGE: "0"

# 默认不停止外部 LLM judge 服务。
AUTO_STOP_LLM_JUDGE: "0"

# 若 reranker=llm_as_judge，则先检查 judge endpoint 是否可用。
LLM_JUDGE_PREFLIGHT: "1"

# 等待 LLM judge 服务 ready 的最长时间，单位秒。
LLM_JUDGE_WAIT_SECONDS: "600"

# 显式设备等待列表。null 表示由 compiler 根据 run_mode/reranker 自动派生。
WAIT_FOR_GPUS: null

# 启动 eval 前等待目标设备释放。
WAIT_FOR_GPU_RELEASE: "1"

# 设备等待轮询间隔，单位秒。
WAIT_FOR_GPU_INTERVAL_SECONDS: "30"

# 设备等待日志中的标签。
WAIT_FOR_GPU_LABEL: "coagentic retriever eval GPU wait"
