# resource 配置基线。
# null 表示 base 不给默认值，必须由具体 resource config、overlay 或明确支持的运行时覆盖提供。

# 实验组名，用于默认日志/报告目录分组。
GROUP_NAME: null

# agent vLLM 可见设备 ID 列表，例如 "0,1"。
AGENT_GPU_IDS: null

# dense ranker 进程使用的设备 ID。
RANK_GPU_ID: null

# recall retriever 服务使用的设备 ID。
RECALL_GPU_ID: null

# LLM judge 服务使用的设备 ID 列表，仅 reranker=llm_as_judge 时需要。
LLM_JUDGE_GPU_IDS: null

# launcher 是否允许自动启动 recall retriever 服务。
AUTO_START_RECALL_SERVICE: null

# launcher 退出时是否停止由自己启动的 recall retriever 服务。
AUTO_STOP_RECALL_SERVICE: null

# 等待 recall retriever 服务 ready 的最长时间，单位秒。
RECALL_SERVICE_WAIT_SECONDS: null

# launcher 是否允许自动启动 LLM judge 服务。
AUTO_START_LLM_JUDGE: null

# launcher 退出时是否停止由自己启动的 LLM judge 服务。
AUTO_STOP_LLM_JUDGE: null

# 是否对 LLM judge endpoint 做 preflight。
LLM_JUDGE_PREFLIGHT: null

# 等待 LLM judge 服务 ready 的最长时间，单位秒。
LLM_JUDGE_WAIT_SECONDS: null

# 显式等待哪些设备释放。null 表示 compiler 根据 agent/ranker/recall/judge 设备自动派生。
WAIT_FOR_GPUS: null

# 启动服务或训练/评估前是否等待目标设备释放。
WAIT_FOR_GPU_RELEASE: null

# 等待设备释放时的轮询间隔，单位秒。
WAIT_FOR_GPU_INTERVAL_SECONDS: null

# 设备等待日志里展示的标签。
WAIT_FOR_GPU_LABEL: null
