# CoAgenticRetriever search tool 静态模板。
#
# eval/training launcher 会把这个模板复制成每次运行自己的 runtime tool config。
# recall_final_top_n、ranker.final_top_k、ranker device/token length 等运行态字段不在
# 这个静态模板里维护，而是由 compiler 从最终 Hydra/ranker 配置生成。

tools:
  # 搜索工具类；agent 发出 search tool call 时会调用这个实现。
  - class_name: verl.tools.coagentic_retriever_tool.CoAgenticRetrieverTool
    config:
      # 工具类型标记；当前实现按本地/原生 HTTP recall retriever + 本地 ranker 使用。
      type: native

      # recall retriever HTTP 服务地址；工具会向该地址请求候选文档。
      retrieval_service_url: "http://127.0.0.1:8030/retrieve"
      # 单次 recall 请求超时时间，单位秒。
      timeout: 30

      # recall 请求失败后的最大重试次数。
      max_retries: 3
      # 第一次重试前等待时间，单位秒。
      retry_delay: 1.0
      # 每次失败后重试等待时间的放大倍率。
      retry_backoff: 2.0

      # 最终格式化进 tool response、交给 agent 继续 think/generate 的文档数上限。
      searchTool_final_top_m: 5
      # 工具奖励 hit 指标的 cutoff 列表，例如 hit@1/hit@3/hit@5。
      hit_cutoffs: [1, 3, 5]
      # 工具奖励指标类型；hit 表示按答案是否命中文档计算，ndcg 表示按 NDCG 计算。
      tool_score_metric: "hit"
      # 这些答案被视为简单答案；计算 answer_in_docs 时会特殊处理，避免无意义匹配。
      trivial_answers: ["yes", "no", "true", "false"]
      # 每个 worker 内允许并发执行的 search tool 请求数。
      max_concurrent_per_worker: 4

      # 是否启用 dense ranker；false 时会跳过 ranker，直接用 recall top-N 的原始顺序。
      ranker_enabled: true
      # dense ranker 配置；ranker_enabled=true 时才会参与重排。
      ranker:
        # ranker 后端。
        # ray_actor: AgentLoopWorker 不再各自加载 E5，而是调用训练进程创建的共享 Ray actor。
        # local: 每个 AgentLoopWorker 单独加载一份 E5，仅用于调试旧路径。
        backend: ray_actor
        # recall 候选池大小，以及 ranker 的模型路径、encoder 路径、device、
        # trust_remote_code、query/doc token length 不在静态 tool config 中维护。
        # canonical launcher 会从最终 Hydra recall_retriever/ranker 配置生成本次
        # run 的 runtime tool config:
        #   <LOG_DIR>/<RUN_NAME>.tool_config.yaml
        # Hydra 事实源通常来自：
        #   CoAgenticRetriever/config/experimental/ranker_base/ranker_contrastive.yaml
        # Ray actor name/namespace 也由 canonical launcher 从 Hydra
        # ranker_training.shared_inference_ranker 生成到 runtime tool config。
        # ray_actor 模式下要求 dense ranker 可用；失败时直接抛错中断训练，绝不兜底 recall 顺序。
        required: true
